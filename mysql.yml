- name: setup mysql config
  hosts: mysql
  become: yes
  tasks:
    - name: update cache
      apt:
        update_cache: yes


    - name: Install mysql and pymysql
      package:
        name: "{{ item }}"
        state: present
      loop:
        - mysql-server
        - python3-pymysql

    - name: start and enable mysql
      service:
         name: mysql
         state: started
         enabled: yes

    - name: configuring root localhost configuration
      shell: mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH auth_socket;"
      ignore_errors: yes

    - name: create root user for remote connection
      shell: |
        mysql -e "CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED BY 'Manoj@123';
        GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;"
      ignore_errors: yes

    - name: Flush privileges
      shell: mysql -e "FLUSH PRIVILEGES;"
      

    - name: Allowing remote connections
      replace:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '127.0.0.1'
        replace: '0.0.0.0'


    - name: Restart mysql
      service:
        name: mysql
        state: restarted
      
